<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PubMed Abstract Scraper{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-book-medical"></i>
                <span>PubMed Scraper</span>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>
                    <i class="fas fa-search"></i> Search
                </a>
                <a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>
                    <i class="fas fa-info-circle"></i> About
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 PubMed Abstract Scraper | Powered by NCBI E-utilities API</p>
            <p class="footer-links">
                <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank">PubMed</a> |
                <a href="https://www.ncbi.nlm.nih.gov/books/NBK25501/" target="_blank">API Docs</a> |
                <a href="https://github.com" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
