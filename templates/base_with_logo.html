<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PubMed Abstract Scraper{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='images/episciencelogo.png') }}" alt="EpiScience Logo" class="logo-image">
                <span>PubMed Scraper</span>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>
                    <i class="fas fa-search"></i> Search
                </a>
                <a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>
                    <i class="fas fa-info-circle"></i> About
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="{{ url_for('static', filename='images/episciencelogo.png') }}" alt="EpiScience Logo" class="footer-logo-image">
                </div>
                <div class="footer-text">
                    <p>&copy; 2026 EpiScience PubMed Abstract Scraper</p>
                </div>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
